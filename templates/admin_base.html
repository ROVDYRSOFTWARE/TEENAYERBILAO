<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <title>{% block title %}Panel administrador{% endblock %}</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body { font-family: Arial, sans-serif; margin: 0; background: #0b1020; color: #e5e7eb; }
    nav { background: #020617; color: white; padding: 14px 18px; display:flex; gap:14px; flex-wrap:wrap; border-bottom:1px solid #1f2937; }
    nav a { color: #f8fafc; text-decoration: none; font-weight: 700; }
    .container { max-width: 1200px; margin: 0 auto; padding: 20px; }
    .grid { display:grid; grid-template-columns: repeat(auto-fit,minmax(260px,1fr)); gap:16px; }
    .card { background:#111827; border-radius:16px; padding:16px; box-shadow: 0 4px 18px rgba(0,0,0,.25); }
    .muted { color:#94a3b8; }
    .btn { display:inline-block; padding:10px 14px; border-radius:10px; text-decoration:none; background:#2563eb; color:white; border:none; cursor:pointer; }
    .btn.secondary { background:#334155; }
    .btn.warn { background:#b91c1c; }
    form.inline { display:inline; }
    input, textarea, select { width:100%; padding:10px; border:1px solid #334155; color:#e5e7eb; background:#0f172a; border-radius:10px; margin-top:6px; margin-bottom:12px; box-sizing:border-box; }
    label { font-weight:600; display:block; }
    table { width:100%; border-collapse: collapse; background:#111827; }
    th, td { padding:10px; border-bottom:1px solid #1f2937; text-align:left; vertical-align:top; }
    .flash { background:#052e16; color:#bbf7d0; padding:12px 14px; border-radius:12px; margin-bottom:16px; }
    .hero { background: linear-gradient(135deg,#111827,#1e3a8a); color:white; padding:24px; border-radius:18px; margin-bottom:18px; }
    .topline {font-size:12px;color:#93c5fd;text-transform:uppercase;letter-spacing:.08em;}
  </style>
</head>
<body>
<nav>
  <a href="{{ url_for('admin') }}">Panel</a>
  <a href="{{ url_for('admin_contenidos') }}">Contenidos</a>
  <a href="{{ url_for('admin_auditoria') }}">Auditoría</a>
  <a href="{{ url_for('export_auditoria') }}">CSV auditoría</a>
  <a href="{{ url_for('export_estadisticas') }}">CSV estadísticas</a>
  <a href="{{ url_for('admin_logout') }}">Cerrar sesión</a>
</nav>
<div class="container">
  {% with messages = get_flashed_messages() %}
    {% if messages %}
      {% for msg in messages %}
        <div class="flash">{{ msg }}</div>
      {% endfor %}
    {% endif %}
  {% endwith %}
  {% block content %}{% endblock %}
</div>
</body>
</html>
