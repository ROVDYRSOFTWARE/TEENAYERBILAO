{% extends 'base.html' %}
{% block title %}{{ 'Editar lugar' if item else 'Nuevo lugar' }}{% endblock %}

{% block content %}
<h1>{{ 'Editar lugar' if item else 'Nuevo lugar' }}</h1>

<form method="post" class="card">
  {% if item and item.id %}
    <input type="hidden" name="id" value="{{ item.id }}">
  {% endif %}

  <label><strong>Nombre</strong></label>
  <input type="text" name="nombre" value="{{ item.nombre if item else '' }}" style="width:100%; margin:8px 0 16px 0;" required>

  <label><strong>Categoría</strong></label>
  <select name="categoria" style="width:100%; margin:8px 0 16px 0;">
    <option value="">-- Seleccionar --</option>
    {% for value in options.categorias %}
      <option value="{{ value }}" {% if item and item.categoria == value %}selected{% endif %}>{{ value }}</option>
    {% endfor %}
  </select>

  <label><strong>Barrio</strong></label>
  <select name="barrio" style="width:100%; margin:8px 0 16px 0;">
    <option value="">-- Seleccionar --</option>
    {% for value in options.barrios %}
      <option value="{{ value }}" {% if item and item.barrio == value %}selected{% endif %}>{{ value }}</option>
    {% endfor %}
  </select>

  <label><strong>Franja</strong></label>
  <select name="franja" style="width:100%; margin:8px 0 16px 0;">
    <option value="">-- Seleccionar --</option>
    {% for value in options.franjas %}
      <option value="{{ value }}" {% if item and item.franja == value %}selected{% endif %}>{{ value }}</option>
    {% endfor %}
  </select>

  <label><strong>Precio</strong></label>
  <select name="precio_tipo" style="width:100%; margin:8px 0 16px 0;">
    <option value="">-- Seleccionar --</option>
    {% for value in options.presupuesto %}
      <option value="{{ value }}" {% if item and item.precio_tipo == value %}selected{% endif %}>{{ value }}</option>
    {% endfor %}
  </select>

  <label><strong>Ubicación</strong></label>
  <input type="text" name="ubicacion" value="{{ item.ubicacion if item else '' }}" style="width:100%; margin:8px 0 16px 0;">

  <label><strong>Dirección</strong></label>
  <input type="text" name="direccion" value="{{ item.direccion if item else '' }}" style="width:100%; margin:8px 0 16px 0;">

  <label><strong>Latitud</strong></label>
  <input type="text" name="latitud" value="{{ item.latitud if item else '' }}" style="width:100%; margin:8px 0 16px 0;">

  <label><strong>Longitud</strong></label>
  <input type="text" name="longitud" value="{{ item.longitud if item else '' }}" style="width:100%; margin:8px 0 16px 0;">

  <label><strong>Maps URL</strong></label>
  <input type="text" name="maps_url" value="{{ item.maps_url if item else '' }}" style="width:100%; margin:8px 0 16px 0;">

  <label><strong>Fuente</strong></label>
  <input type="text" name="fuente" value="{{ item.fuente if item else '' }}" style="width:100%; margin:8px 0 16px 0;">

  <label><strong>URL</strong></label>
  <input type="text" name="url" value="{{ item.url if item else '' }}" style="width:100%; margin:8px 0 16px 0;">

  <label><strong>Tags</strong></label>
  <input type="text" name="tags" value="{{ item.tags|join(', ') if item and item.tags else '' }}" placeholder="tag1, tag2, tag3" style="width:100%; margin:8px 0 16px 0;">

  <label><strong>Descripción</strong></label>
  <textarea name="descripcion" rows="6" style="width:100%; margin:8px 0 16px 0;">{{ item.descripcion if item else '' }}</textarea>

  <button type="submit" class="btn">Guardar lugar</button>
</form>
{% endblock %}
