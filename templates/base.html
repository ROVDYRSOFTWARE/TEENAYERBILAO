<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <title>{% block title %}Teenager Bilbao{% endblock %}</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body { font-family: Arial, sans-serif; margin: 0; background: #f6f7fb; color: #1d2433; }
    nav { background: #111827; color: white; padding: 14px 18px; display:flex; gap:14px; flex-wrap:wrap; }
    nav a { color: white; text-decoration: none; font-weight: 600; }
    .container { max-width: 1080px; margin: 0 auto; padding: 20px; }
    .grid { display:grid; grid-template-columns: repeat(auto-fit,minmax(260px,1fr)); gap:16px; }
    .card { background:white; border-radius:16px; padding:16px; box-shadow: 0 4px 18px rgba(0,0,0,.07); }
    .muted { color:#6b7280; }
    .pill { display:inline-block; padding:4px 10px; border-radius:999px; background:#eef2ff; color:#4338ca; font-size:12px; margin-right:6px; margin-bottom:6px; }
    .btn { display:inline-block; padding:10px 14px; border-radius:10px; text-decoration:none; background:#2563eb; color:white; border:none; cursor:pointer; }
    .btn.secondary { background:#111827; }
    .btn.warn { background:#b91c1c; }
    form.inline { display:inline; }
    input, textarea, select { width:100%; padding:10px; border:1px solid #d1d5db; border-radius:10px; margin-top:6px; margin-bottom:12px; box-sizing:border-box; }
    label { font-weight:600; display:block; }
    table { width:100%; border-collapse: collapse; background:white; }
    th, td { padding:10px; border-bottom:1px solid #e5e7eb; text-align:left; vertical-align:top; }
    .flash { background:#ecfccb; color:#365314; padding:12px 14px; border-radius:12px; margin-bottom:16px; }
    .hero { background: linear-gradient(135deg,#111827,#1d4ed8); color:white; padding:24px; border-radius:18px; margin-bottom:18px; }
  </style>
</head>
<body>
<nav>
  <a href="{{ url_for('home') }}">Inicio</a>
  <a href="{{ url_for('eventos') }}">Eventos</a>
  <a href="{{ url_for('lugares') }}">Lugares</a>
  <a href="{{ url_for('recomendado') }}">Recomendado</a>
  <a href="{{ url_for('plan_hoy') }}">Plan hoy</a>
  <a href="{{ url_for('preferencias') }}">Preferencias</a>
</nav>
<div class="container">
  {% with messages = get_flashed_messages() %}
    {% if messages %}
      {% for msg in messages %}
        <div class="flash">{{ msg }}</div>
      {% endfor %}
    {% endif %}
  {% endwith %}
  {% block content %}{% endblock %}
</div>
</body>
</html>
